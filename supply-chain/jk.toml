[project]
group    = "dev.jkbuild"
name     = "jk-supply-chain"
version  = "0.6.0-SNAPSHOT"
jdk      = 25
java     = 25

[dependencies.main]
jk-core             = { group = "dev.jkbuild",        name     = "jk-core",             version = "0.6.0-SNAPSHOT" }
jk-io               = { group = "dev.jkbuild",        name     = "jk-io",               version = "0.6.0-SNAPSHOT" }
sigstore-java       = { group = "dev.sigstore",       name     = "sigstore-java",       version = "2.1.0" }
bcpg-jdk18on        = { group = "org.bouncycastle",   name     = "bcpg-jdk18on",        version = "1.84" }
cyclonedx-core-java = { group = "org.cyclonedx",      name     = "cyclonedx-core-java", version = "12.2.0" }
java-spdx-library   = { group = "org.spdx",           name     = "java-spdx-library",   version = "2.0.3" }
jackson-databind    = { group = "tools.jackson.core", name     = "jackson-databind",    version = "3.1.3" }

[dependencies.test]
jk-supply-chain-testkit = { group = "dev.jkbuild",        name     = "jk-supply-chain-testkit", version = "0.6.0-SNAPSHOT" }
assertj-core            = { group = "org.assertj",        name     = "assertj-core",            version = "3.27.7" }
junit-jupiter           = { group = "org.junit.jupiter",  name     = "junit-jupiter",           version = "6.1.0" }
junit-platform-launcher = { group = "org.junit.platform", name     = "junit-platform-launcher", version = "6.1.0" }

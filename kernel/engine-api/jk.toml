[project]
group    = "dev.jkbuild"
name     = "jk-engine-api"
version  = "0.10.0-SNAPSHOT"
description = "jk engine API: the client<->engine wire contract — protocol codec, paths, build DTOs."
jdk      = 25
java     = 25

[dependencies]
jk-model      = { group = "dev.jkbuild", name = "jk-model",      version = "0.10.0-SNAPSHOT" }
jk-core       = { group = "dev.jkbuild", name = "jk-core",       version = "0.10.0-SNAPSHOT" }
jk-plugin-api = { group = "dev.jkbuild", name = "jk-plugin-api", version = "0.10.0-SNAPSHOT" }

[test-dependencies]
assertj-core            = { group = "org.assertj",        name = "assertj-core",            version = "3.27.7" }
junit-jupiter           = { group = "org.junit.jupiter",  name = "junit-jupiter",           version = "6.1.0" }
junit-platform-launcher = { group = "org.junit.platform", name = "junit-platform-launcher", version = "6.1.0" }

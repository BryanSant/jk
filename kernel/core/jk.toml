[project]
group    = "dev.jkbuild"
name     = "jk-core"
version  = "0.10.0-SNAPSHOT"
description = "jk core foundations: TOML config parser, lockfile, layout, deny policy."
jdk      = 25
java     = 25

[dependencies]
jk-model = { group = "dev.jkbuild", name = "jk-model", version = "0.10.0-SNAPSHOT" }
tomlj    = { group = "org.tomlj",   name = "tomlj",    version = "1.1.1" }
# ComparableVersion for Versions.compare — rehomed from jk-resolver with the slim-client stage 5
# move (mirrors build.gradle.kts).
maven-artifact = { group = "org.apache.maven", name = "maven-artifact", version = "3.9.16" }

[test-dependencies]
assertj-core            = { group = "org.assertj",        name = "assertj-core",            version = "3.27.7" }
junit-jupiter           = { group = "org.junit.jupiter",  name = "junit-jupiter",           version = "6.1.0" }
junit-platform-launcher = { group = "org.junit.platform", name = "junit-platform-launcher", version = "6.1.0" }

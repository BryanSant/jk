[project]
group    = "dev.jkbuild"
artifact = "jk-supply-chain-testkit"
version  = "0.6.0-SNAPSHOT"
jdk      = 25
java     = 25

# Test helpers for jk-supply-chain consumers. Lives in its own workspace
# member (rather than supply-chain's testFixtures classifier) so that any
# downstream module — Gradle or jk — can pull it in via a plain
# `[dependencies.test]` entry, without needing build-tool-specific
# testFixtures plumbing.

[dependencies.main]
bcpg-jdk18on = { group = "org.bouncycastle", artifact = "bcpg-jdk18on", version = "1.84" }

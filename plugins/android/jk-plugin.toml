# The built-in android build plugin's declarative manifest — the P6 SPI stress test
# (build-plugins plan §4 P6, android-plan.md Phase 1). Owns [android]; the code layer
# carries the aapt2 resource step (R generation, before compile), the d8 dex step, and
# the APK packager. Everything framework-shaped rides the SAME public SPI the
# spring-boot blueprint uses — the engine has zero Android-specific code.
#
# The platform jar comes from the provisioned SDK (platforms;android-<compile-sdk>) —
# the repository2 feed + license machinery of android-plan §3.2; an existing Studio SDK
# is reused via the symlinked managed root.

[plugin]
id        = "android"
table     = "android"
version   = "0.1.0"
jk-compat = ">=0.10"

[code]
worker          = "jk-android"
protocol-prefix = "##JKAN:"

# The APK replaces the main artifact under its own extension; it is a device artifact —
# not host-runnable. `jk run` dispatches the declared deploy verb (adb install + am start);
# `jk dev` rebuilds and re-dispatches the same verb (restart-based redeploy). A library
# module ([android] library = true) packages an AAR instead — not executable at all.
[packaging]
packager           = "apk"
exec-mode          = "device"
self-contained     = true
artifact-extension = "apk"
deploy-verb        = "deploy"

[[packaging.variant]]
when               = { config = "library", equals = "true" }
packager           = "aar"
exec-mode          = "none"
artifact-extension = "aar"

# A release app packages an AAB (the Play-uploadable default — android-plan §3.3); `jk run`
# still deploys it locally: the deploy verb builds a universal APK via bundletool first.
# Order matters: the library variant above wins for a release library build.
[[packaging.variant]]
when               = { config = "build-type", equals = "release" }
packager           = "aab"
exec-mode          = "device"
artifact-extension = "aab"
deploy-verb        = "deploy"

[schema]
namespace    = { type = "string", required = true, example = "com.example.app", hint = "it names the R class package and the default application id" }
compile-sdk  = { type = "int", required = true, example = "28" }
min-sdk      = { type = "int", required = true, example = "24" }
library      = { type = "bool", default = false }   # a library module: packages an AAR, not an APK
compose      = { type = "bool", default = false }   # adds the Compose compiler plugin (version == Kotlin)
build-config = { type = "bool", default = false }   # generates BuildConfig.java (explicit toggle, not a grab-bag)
# Extra BuildConfig constants, each a verbatim `TYPE NAME = VALUE` Java declaration
# (AGP's buildConfigField, declarative): ['String BACKEND_URL = "http://example.com"']
build-config-fields = { type = "string-list", default = [] }
hilt         = { type = "bool", default = false }   # Hilt unmodified-source mode: superclass transform + processor toggle

# ---- Variants (android-plan §3.1): build types × one flavor dimension --------------------------
#
# [android.build-types.<name>] / [android.flavors.<dim>.<name>] entries are config OVERLAYS —
# `jk build --release` selects one per axis; the engine folds it into the effective config
# (Variants.apply) and injects `build-type` / `flavor`, which [[packaging.variant]] conditions on.
# debug/release are built in; `minify` left absent defaults ON for release (AGP-9 posture).

[sub-schema.variant]
application-id-suffix = { type = "string" }
minify                = { type = "bool" }                     # tri-state: absent = on for release
proguard-files        = { type = "string-list", default = [] }
signing               = { type = "string" }                   # names an [android.signing.<name>]
debuggable            = { type = "bool" }
build-config-fields   = { type = "string-list" }              # per-variant BuildConfig constants (overlay replaces)
# Per-variant source dirs (module-relative; AGP's src/<flavor>/kotlin), joined to the
# compiler + KSP source set when the variant is selected. The explicit opt-in that keeps
# variants config overlays — the dirs are data, not a source-set object model.
extra-src             = { type = "string-list" }

# Signing configs (android-plan §3.1): env: indirection only — never literal secrets in TOML.
# `secret = true` keys resolve client-side (the user's shell env rides the request) and travel
# a side channel the engine never renders into tokens, describe payloads, or logs.
[sub-schema.signing]
store-file      = { type = "string", required = true, example = "env:KEYSTORE_FILE" }
store-password  = { type = "string", secret = true }
key-alias       = { type = "string", required = true }
key-password    = { type = "string", secret = true }
# v3 key rotation: schema'd for forward-compat, not yet wired (android-plan Phase 3 records it).
next-store-file = { type = "string" }

[sub-tables.build-types]
schema       = "variant"
variant-axis = "build-type"
built-in     = ["debug", "release"]
default      = "debug"

[sub-tables.flavors]
schema       = "variant"
variant-axis = "flavor"
dimensioned  = true

[sub-tables.signing]
schema = "signing"

# Compose (android-plan §3.5): the embeddable Compose compiler plugin, version-locked to
# the Kotlin compiler actually used — the version-matching dance is gone by construction.
[[contribute.kotlin-plugin]]
id         = "androidx.compose.compiler"
coordinate = "org.jetbrains.kotlin:kotlin-compose-compiler-plugin-embeddable:${kotlin.version}"
when       = { config = "compose", equals = "true" }

# Hilt unmodified-source mode (android-plan Phase 5, blocker 4): without this option Hilt's
# processor insists on the plugin-less spelling (@AndroidEntryPoint(Base) + extends Hilt_*);
# with it, plain @AndroidEntryPoint compiles and the android-hilt-transform step rewrites
# superclasses — the same contract AGP's Hilt plugin implements.
[[contribute.compiler-args]]
ksp  = ["dagger.hilt.android.internal.disableAndroidSuperclassValidation=true"]
when = { config = "hilt", equals = "true" }

# ---- Tool artifacts (fetched engine-side into the cache, handed to steps by name) ----

# aapt2 ships as a per-OS binary wrapped in a Maven jar; ${host.os} picks the classifier.
[[contribute.step-dependency]]
artifact   = "aapt2"
coordinate = "com.android.tools.build:aapt2:8.7.3-12006047:${host.os}"

# d8 lives in the r8 jar (com.android.tools.r8.D8) — a plain JVM tool.
[[contribute.step-dependency]]
artifact   = "r8"
coordinate = "com.android.tools:r8:8.5.35"

# manifest-merger is a JVM library with a real dependency graph — the transitive closure
# materializes as a lib dir the step forks `java -cp` over. 31.7.3 = the AGP-8.7.x tools line.
[[contribute.step-dependency]]
artifact   = "manifest-merger"
coordinate = "com.android.tools.build:manifest-merger:31.7.3"
transitive = true

# The platform jar: aapt2 -I (framework resources), javac (via provided-classpath below),
# d8 --lib. Provisioned from Google's repository2 feed into the managed SDK root — reusing
# an existing $ANDROID_HOME/Studio SDK when one is discovered (android-plan §3.2).
[[contribute.step-dependency]]
artifact      = "android-jar"
sdk-component = "platforms;android-${config.compile-sdk}"
sdk-path      = "android.jar"

# javac/kotlinc compile against the platform (PROVIDED posture: the runtime, dex inputs,
# and packaging never see it — dex takes it explicitly via --lib from the extra above).
# KMP variant selection: androidx/kotlinx KMP roots redirect their runtime to the
# platform artifact GMM names for this environment (-android over the POM's -jvm fallback).
[contribute.resolution]
jvm-environment = "android"

[[contribute.provided-classpath]]
dependency = "android-jar"

# bundletool, for the AAB packager and the deploy verb's universal-APK path — a JVM library
# with a real dependency graph, forked over its transitive closure like manifest-merger.
[[contribute.step-dependency]]
artifact   = "bundletool"
coordinate = "com.android.tools.build:bundletool:1.17.2"
transitive = true

# adb, for the deploy verb (`jk run` onto a device) — provisioned platform-tools.
[[contribute.step-dependency]]
artifact      = "adb"
sdk-component = "platform-tools"
sdk-path      = "adb"

# The SDK root itself, for the provisioning verbs (`jk android licenses|sdk`).
[[contribute.step-dependency]]
artifact      = "sdk-root"
sdk-component = "root"

# The built-in android build plugin's declarative manifest — the P6 SPI stress test
# (build-plugins plan §4 P6, android-plan.md Phase 1). Owns [android]; the code layer
# carries the aapt2 resource step (R generation, before compile), the d8 dex step, and
# the APK packager. Everything framework-shaped rides the SAME public SPI the
# spring-boot blueprint uses — the engine has zero Android-specific code.
#
# The platform jar comes from the provisioned SDK (platforms;android-<compile-sdk>) —
# the repository2 feed + license machinery of android-plan §3.2; an existing Studio SDK
# is reused via the symlinked managed root.

[plugin]
id        = "android"
table     = "android"
version   = "0.1.0"
jk-compat = ">=0.10"

[code]
worker          = "jk-android"
protocol-prefix = "##JKAN:"

# The APK replaces the main artifact under its own extension; it is a device artifact —
# not host-runnable. `jk run` dispatches the declared deploy verb (adb install + am start);
# `jk dev` still answers with the descriptor error (the redeploy loop is Phase 2).
[packaging]
packager           = "apk"
exec-mode          = "device"
self-contained     = true
artifact-extension = "apk"
deploy-verb        = "deploy"

[schema]
namespace   = { type = "string", required = true, example = "com.example.app", hint = "it names the R class package and the default application id" }
compile-sdk = { type = "int", required = true, example = "28" }
min-sdk     = { type = "int", required = true, example = "24" }

# ---- Tool artifacts (fetched engine-side into the cache, handed to steps by name) ----

# aapt2 ships as a per-OS binary wrapped in a Maven jar; ${host.os} picks the classifier.
[[contribute.step-dependency]]
artifact   = "aapt2"
coordinate = "com.android.tools.build:aapt2:8.7.3-12006047:${host.os}"

# d8 lives in the r8 jar (com.android.tools.r8.D8) — a plain JVM tool.
[[contribute.step-dependency]]
artifact   = "r8"
coordinate = "com.android.tools:r8:8.5.35"

# manifest-merger is a JVM library with a real dependency graph — the transitive closure
# materializes as a lib dir the step forks `java -cp` over. 31.7.3 = the AGP-8.7.x tools line.
[[contribute.step-dependency]]
artifact   = "manifest-merger"
coordinate = "com.android.tools.build:manifest-merger:31.7.3"
transitive = true

# The platform jar: aapt2 -I (framework resources), javac (via provided-classpath below),
# d8 --lib. Provisioned from Google's repository2 feed into the managed SDK root — reusing
# an existing $ANDROID_HOME/Studio SDK when one is discovered (android-plan §3.2).
[[contribute.step-dependency]]
artifact      = "android-jar"
sdk-component = "platforms;android-${config.compile-sdk}"
sdk-path      = "android.jar"

# javac/kotlinc compile against the platform (PROVIDED posture: the runtime, dex inputs,
# and packaging never see it — dex takes it explicitly via --lib from the extra above).
[[contribute.provided-classpath]]
dependency = "android-jar"

# adb, for the deploy verb (`jk run` onto a device) — provisioned platform-tools.
[[contribute.step-dependency]]
artifact      = "adb"
sdk-component = "platform-tools"
sdk-path      = "adb"

# The SDK root itself, for the provisioning verbs (`jk android licenses|sdk`).
[[contribute.step-dependency]]
artifact      = "sdk-root"
sdk-component = "root"

# The built-in spring-boot build plugin's declarative manifest (build-plugins plan §3.1).
# The declarative layer: [plugin] identity, the [schema] for the [spring-boot] table, and
# the [[contribute.*]] build contributions. Worker code hooks arrive in P3. This file is the
# single source of truth — kernel/core bakes it in as a classpath resource at build time.
#
# This file is the blueprint third-party plugins copy: one table owned, typed schema,
# error-message metadata (example/hint) so schema-driven validation diagnoses as well as
# hand-written parsing did.

[plugin]
id        = "spring-boot"
table     = "spring-boot"
version   = "1.0.0"
jk-compat = ">=0.10"

[schema]
version       = { type = "string", required = true, example = "4.0.0", hint = "it pins the spring-boot-dependencies BOM, loader, and AOT tooling" }
aot           = { type = "bool" }                          # tri-state: absent = auto (on when [native] is declared)
build-info    = { type = "bool", default = false }
include-tools = { type = "bool", default = true }
aot-args      = { type = "string-list", default = [] }

# ---- Declarative contributions (P2) — pure data, evaluated engine-side with zero plugin code.

# Auto-import the Boot BOM so [dependencies] entries need no versions. A user-declared
# spring-boot-dependencies platform entry wins (no duplicate is injected).
[[contribute.platform-dependency]]
coordinate = "org.springframework.boot:spring-boot-dependencies:${config.version}"

# Boot reflects on constructor/handler parameter names — compile with parameter names kept.
# Each arg applies only when the user's own args don't already carry it.
[[contribute.compiler-args]]
javac  = ["-parameters"]
kotlin = ["-java-parameters"]

# Boot proxies @Configuration/@Component classes — Kotlin classes are final unless the
# all-open (kotlin-spring) plugin opens the annotated ones. ${kotlin.version} keeps the
# embeddable plugin lockstep with the compiler actually used.
[[contribute.kotlin-plugin]]
id         = "org.jetbrains.kotlin.allopen"
coordinate = "org.jetbrains.kotlin:kotlin-allopen-compiler-plugin-embeddable:${kotlin.version}"
options    = ["preset=spring"]

# JPA entities need a zero-arg constructor Kotlin classes don't have — the no-arg plugin
# (jpa preset) synthesizes them, keyed on the persistence API actually being resolved.
[[contribute.kotlin-plugin]]
id         = "org.jetbrains.kotlin.noarg"
coordinate = "org.jetbrains.kotlin:kotlin-noarg-compiler-plugin-embeddable:${kotlin.version}"
options    = ["preset=jpa"]
when       = { classpath-has = "jakarta.persistence:jakarta.persistence-api" }

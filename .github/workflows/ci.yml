name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # The runners set TERM=dumb, which turns jk's ANSI rendering off
  # (GlobalConfig) and fails the TUI/highlighting tests that assert
  # escape sequences. Give CI the same terminal the tests assume.
  TERM: xterm-256color

jobs:
  test:
    name: Gradle test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle
      - run: ./gradlew test

  # The self-hosted build is a separate correctness surface from the Gradle one: the per-module
  # jk.toml files drift silently when Gradle deps change (stage 5's module moves shipped exactly
  # that). Building the real dist (native jk client + lib/jk-engine-<version>.jar) and running
  # `jk build` on this repo exercises the shipping client, the engine spawn, the resolver, and
  # the jk.toml/jk.lock graph end to end.
  dogfood:
    name: Self-hosted jk build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: graalvm
          java-version: '25'
          cache: gradle
      - name: Build the native dist
        run: ./gradlew dist
      - name: Install the engine jar into ~/.jk/lib
        # The client resolves the engine at ~/.jk/lib/jk-engine-<its own version>.jar;
        # the dist's lib/ mirrors that layout.
        run: mkdir -p ~/.jk/lib && cp build/dist/lib/jk-engine-*.jar ~/.jk/lib/
      - name: Side-load worker jars into the jk CAS
        # jk's own workers (test-runner, compilers, …) aren't on Maven Central
        # yet; `jk build` forks them from the local CAS.
        run: ./gradlew installLocal
      - name: jk builds jk
        run: build/dist/jk build
        env:
          # jk build runs the test suites through jk's forked test-runner workers,
          # which inherit this step's environment — CI=true would turn ANSI off and
          # fail the TUI tests (Gradle pins the same env for its own test JVMs in
          # cli-engine/build.gradle.kts; jk workers have no such seam yet).
          CI: 'false'
